<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立石くんの楽しいフランス語会話アプリ</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

h1{
    color:#2c3e50;
}

#chat{
    width:90%;
    max-width:700px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:left;
    min-height:300px;
}

input{
    width:60%;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}

.user{
    color:blue;
}

.ai{
    color:green;
}
</style>
</head>

<body>

<h1>🇫🇷 立石くんの楽しいフランス語会話アプリ 🇯🇵</h1>

<div id="chat">
<p class="ai">
<b>先生:</b><br>
🇫🇷 Bonjour ! Comment allez-vous ?<br>
🇯🇵 こんにちは！お元気ですか？
</p>
</div>

<input type="text" id="userInput" placeholder="フランス語を入力">
<button onclick="sendMessage()">送信</button>
<button onclick="startVoice()">🎤 音声入力</button>

<script>

function sendMessage(){

const input = document.getElementById("userInput").value.trim();

if(input==="") return;

const chat = document.getElementById("chat");

chat.innerHTML += `
<p class="user">
<b>あなた:</b><br>
🇫🇷 ${input}
</p>
`;

let french = "";
let japanese = "";

const text = input.toLowerCase();

if(text.includes("bonjour")){
    french = "Bonjour ! Ravi de vous rencontrer.";
    japanese = "こんにちは！お会いできてうれしいです。";
}
else if(text.includes("ça va")){
    french = "Oui, ça va très bien. Merci !";
    japanese = "はい、とても元気です。ありがとう！";
}
else if(text.includes("merci")){
    french = "De rien !";
    japanese = "どういたしまして！";
}
else if(text.includes("au revoir")){
    french = "Au revoir et à bientôt !";
    japanese = "さようなら、また会いましょう！";
}
else if(text.includes("je m'appelle")){
    french = "Enchanté !";
    japanese = "はじめまして！";
}
else{
    french = "Très bien ! Continuons la conversation.";
    japanese = "いいですね！会話を続けましょう。";
}

chat.innerHTML += `
<p class="ai">
<b>先生:</b><br>
🇫🇷 ${french}<br>
🇯🇵 ${japanese}
</p>
`;

document.getElementById("userInput").value = "";
chat.scrollTop = chat.scrollHeight;
}

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
    alert("このブラウザは音声認識に対応していません。");
    return;
}

const recognition = new SpeechRecognition();

recognition.lang = "fr-FR";
recognition.start();

recognition.onresult = function(event){
    document.getElementById("userInput").value =
    event.results[0][0].transcript;
};
}
</script>

</body>
</html>
